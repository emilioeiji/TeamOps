<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Historico Follow por Operador</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="toolbar no-print">
        <button id="btnPrint" class="btn-primary" type="button" data-i18n="print">Imprimir</button>
        <button id="btnPdf" class="btn-secondary" type="button" data-i18n="savePdf">Salvar PDF</button>
    </div>

    <main class="sheet">
        <header class="report-header">
            <div>
                <p class="eyebrow" data-i18n="eyebrow">Historico de acompanhamento</p>
                <h1 data-i18n="reportTitle">FOLLOW HISTORY BY OPERATOR</h1>
                <p class="generated"><span data-i18n="generatedAtPrefix">Gerado em</span> <span id="generatedAt">-</span></p>
            </div>
            <img id="logo" class="brand-logo" alt="TeamOps">
        </header>

        <section class="hero-card">
            <div>
                <span class="section-label" data-i18n="operatorLabel">Operador</span>
                <h2 id="operatorName">-</h2>
                <p id="operatorCode">-</p>
            </div>
            <div class="hero-meta">
                <div class="meta-item">
                    <span data-i18n="startDate">Admissao</span>
                    <strong id="startDate">-</strong>
                </div>
                <div class="meta-item">
                    <span data-i18n="total">Total</span>
                    <strong id="totalCount">0</strong>
                </div>
                <div class="meta-item">
                    <span data-i18n="lastDate">Ultimo registro</span>
                    <strong id="lastDate">-</strong>
                </div>
            </div>
        </section>

        <section id="timeline" class="timeline"></section>
    </main>

    <div id="toast" class="toast hidden">
        <strong id="toastTitle">-</strong>
        <span id="toastMessage">-</span>
    </div>

    <script src="app.js"></script>
</body>
</html>
