<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Operadores</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header-bar">
        Cadastro de Operadores
    </div>

    <div class="page-shell">
        <section class="table-card">
            <div class="panel-top">
                <div class="title-stack">
                    <h1>Operadores</h1>
                    <p>Consulta rapida, busca e manutencao dos operadores.</p>
                </div>

                <div class="header-actions">
                    <label class="header-toggle" for="toggleShowInactive">
                        <input id="toggleShowInactive" type="checkbox">
                        <span>Mostrar inativos</span>
                    </label>

                    <div class="search-group">
                        <label for="searchInput">Buscar</label>
                        <input id="searchInput" class="input" type="text" placeholder="Buscar por FJ, romanji, nihongo, turno, grupo, setor ou telefone...">
                    </div>

                    <button id="btnHeaderNovo" type="button" class="btn-primary">Novo Operador</button>
                </div>
            </div>

            <div id="tableContainer" class="table-container">
                Carregando...
            </div>
        </section>
    </div>

    <div id="operatorModal" class="modal-shell hidden">
        <div id="modalBackdrop" class="modal-backdrop"></div>
        <section class="modal-card">
            <div class="modal-top">
                <div class="title-stack">
                    <h2 id="formTitle">Novo Operador</h2>
                    <p id="formSubtitle">Preencha os dados para cadastrar um novo operador.</p>
                </div>

                <button id="btnCloseModal" type="button" class="icon-close" aria-label="Fechar modal">×</button>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label for="txtCodigoFJ">Codigo FJ</label>
                    <input id="txtCodigoFJ" class="input" type="text" maxlength="20">
                </div>

                <div class="form-group">
                    <label for="txtRomanji">Romanji</label>
                    <input id="txtRomanji" class="input" type="text" maxlength="120">
                </div>

                <div class="form-group">
                    <label for="txtNihongo">Nihongo</label>
                    <input id="txtNihongo" class="input" type="text" maxlength="120">
                </div>

                <div class="form-group">
                    <label for="cmbShift">Turno</label>
                    <select id="cmbShift" class="input">
                        <option value="">Selecione...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="cmbGroup">Grupo</label>
                    <select id="cmbGroup" class="input">
                        <option value="">Selecione...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="cmbSector">Setor</label>
                    <select id="cmbSector" class="input">
                        <option value="">Selecione...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="dtStart">Data de Inicio</label>
                    <input id="dtStart" class="input" type="date">
                </div>

                <div class="form-group">
                    <label for="dtEnd">Data de Termino</label>
                    <input id="dtEnd" class="input" type="date" disabled>
                </div>

                <div class="form-group">
                    <label for="dtNascimento">Nascimento</label>
                    <input id="dtNascimento" class="input" type="date">
                </div>

                <div class="form-group">
                    <label for="txtTelefone">Telefone</label>
                    <input id="txtTelefone" class="input" type="text" maxlength="50">
                </div>

                <div class="form-group form-group-span-2">
                    <label for="txtEndereco">Endereco</label>
                    <input id="txtEndereco" class="input" type="text" maxlength="250">
                </div>
            </div>

            <div class="toggle-grid">
                <label class="toggle-item">
                    <input id="chkHasEnd" type="checkbox">
                    <span>Tem data de termino</span>
                </label>

                <label class="toggle-item">
                    <input id="chkTrainer" type="checkbox">
                    <span>Trainer</span>
                </label>

                <label class="toggle-item">
                    <input id="chkStatus" type="checkbox" checked>
                    <span>Ativo</span>
                </label>

                <label class="toggle-item">
                    <input id="chkIsLeader" type="checkbox">
                    <span>Lider</span>
                </label>
            </div>

            <div class="modal-actions">
                <button id="btnCancelarModal" type="button" class="btn-secondary">Cancelar</button>
                <button id="btnSalvarModal" type="button" class="btn-primary">Salvar</button>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
