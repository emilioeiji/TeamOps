<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Operadores</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="header-bar" data-i18n="headerBar">
        Cadastro de Operadores
    </div>

    <div class="page-shell">
        <section class="table-card">
            <div class="panel-top">
                <div class="title-stack">
                    <h1 data-i18n="pageTitle">Operadores</h1>
                    <p data-i18n="pageSubtitle">Consulta rapida, busca e manutencao dos operadores.</p>
                </div>

                <div class="header-actions">
                    <label class="header-toggle" for="toggleShowInactive">
                        <input id="toggleShowInactive" type="checkbox">
                        <span data-i18n="showInactive">Mostrar inativos</span>
                    </label>

                    <div class="search-group">
                        <label for="searchInput" data-i18n="searchLabel">Buscar</label>
                        <input id="searchInput" class="input" type="text" data-i18n-placeholder="searchPlaceholder" placeholder="Buscar por FJ, romanji, nihongo, turno, grupo, setor ou telefone...">
                    </div>

                    <button id="btnHeaderNovo" type="button" class="btn-primary" data-i18n="newOperator">Novo Operador</button>
                </div>
            </div>

            <div id="tableContainer" class="table-container">
                <span data-i18n="loading">Carregando...</span>
            </div>
        </section>
    </div>

    <div id="operatorModal" class="modal-shell hidden">
        <div id="modalBackdrop" class="modal-backdrop"></div>
        <section class="modal-card">
            <div class="modal-top">
                <div class="title-stack">
                    <h2 id="formTitle">Novo Operador</h2>
                    <p id="formSubtitle">Preencha os dados para cadastrar um novo operador.</p>
                </div>

                <button id="btnCloseModal" type="button" class="icon-close" aria-label="Fechar modal">×</button>
            </div>

            <div class="form-grid">
                <div class="form-group">
                    <label for="txtCodigoFJ" data-i18n="labelCodigoFJ">Codigo FJ</label>
                    <input id="txtCodigoFJ" class="input" type="text" maxlength="20">
                </div>

                <div class="form-group">
                    <label for="txtRomanji" data-i18n="labelRomanji">Romanji</label>
                    <input id="txtRomanji" class="input" type="text" maxlength="120">
                </div>

                <div class="form-group">
                    <label for="txtNihongo" data-i18n="labelNihongo">Nihongo</label>
                    <input id="txtNihongo" class="input" type="text" maxlength="120">
                </div>

                <div class="form-group">
                    <label for="cmbShift" data-i18n="labelShift">Turno</label>
                    <select id="cmbShift" class="input">
                        <option value="" data-i18n="selectPlaceholder">Selecione...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="cmbGroup" data-i18n="labelGroup">Grupo</label>
                    <select id="cmbGroup" class="input">
                        <option value="" data-i18n="selectPlaceholder">Selecione...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="cmbSector" data-i18n="labelSector">Setor</label>
                    <select id="cmbSector" class="input">
                        <option value="" data-i18n="selectPlaceholder">Selecione...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="dtStart" data-i18n="labelStart">Data de Inicio</label>
                    <input id="dtStart" class="input" type="date">
                </div>

                <div class="form-group">
                    <label for="dtEnd" data-i18n="labelEnd">Data de Termino</label>
                    <input id="dtEnd" class="input" type="date" disabled>
                </div>

                <div class="form-group">
                    <label for="dtNascimento" data-i18n="labelBirth">Nascimento</label>
                    <input id="dtNascimento" class="input" type="date">
                </div>

                <div class="form-group">
                    <label for="txtTelefone" data-i18n="labelPhone">Telefone</label>
                    <input id="txtTelefone" class="input" type="text" maxlength="50">
                </div>

                <div class="form-group form-group-span-2">
                    <label for="txtEndereco" data-i18n="labelAddress">Endereco</label>
                    <input id="txtEndereco" class="input" type="text" maxlength="250">
                </div>
            </div>

            <div class="toggle-grid">
                <label class="toggle-item">
                    <input id="chkHasEnd" type="checkbox">
                    <span data-i18n="hasEndDate">Tem data de termino</span>
                </label>

                <label class="toggle-item">
                    <input id="chkTrainer" type="checkbox">
                    <span data-i18n="trainer">Trainer</span>
                </label>

                <label class="toggle-item">
                    <input id="chkStatus" type="checkbox" checked>
                    <span data-i18n="status">Ativo</span>
                </label>

                <label class="toggle-item">
                    <input id="chkIsLeader" type="checkbox">
                    <span data-i18n="leader">Lider</span>
                </label>
            </div>

            <div class="modal-actions">
                <button id="btnCancelarModal" type="button" class="btn-secondary" data-i18n="cancel">Cancelar</button>
                <button id="btnSalvarModal" type="button" class="btn-primary" data-i18n="save">Salvar</button>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
