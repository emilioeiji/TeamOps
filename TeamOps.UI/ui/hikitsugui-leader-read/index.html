<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Hikitsugui Leader Read</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-gray-100">

    <!-- =========================================================
         BARRA AZUL (igual PaidLeave)
    ========================================================= -->
    <div class="header-bar">
        <span id="txtHeaderTitle">Hikitsugui Leader Read</span>
    </div>

    <!-- =========================================================
         FILTROS (container branco igual PaidLeave)
    ========================================================= -->
    <div class="filter-container">

        <div>
            <label id="txtDateFromLabel" class="text-gray-600">Período Inicial</label>
            <input type="date" id="dtInicial" class="input" />
        </div>

        <div>
            <label id="txtDateToLabel" class="text-gray-600">Período Final</label>
            <input type="date" id="dtFinal" class="input" />
        </div>

        <div>
            <label id="txtShiftLabel" class="text-gray-600">Turno</label>
            <select id="shiftId" class="input">
                <option id="txtShiftAll" value="0">Todos</option>
            </select>
        </div>

        <div>
            <label id="txtOperatorLabel" class="text-gray-600">Operador</label>
            <select id="operatorId" class="input">
                <option id="txtOperatorAll" value="0">Todos</option>
            </select>
        </div>

        <div>
            <label id="txtCategoryLabel" class="text-gray-600">Categoria</label>
            <select id="reasonId" class="input">
                <option id="txtCategoryAll" value="0">Todos</option>
            </select>
        </div>

        <div>
            <label id="txtEquipmentLabel" class="text-gray-600">Equipamento</label>
            <select id="equipId" class="input">
                <option id="txtEquipmentAll" value="0">Todos</option>
            </select>
        </div>

        <div>
            <label id="txtLocalLabel" class="text-gray-600">Local</label>
            <select id="localId" class="input">
                <option id="txtLocalAll" value="0">Todos</option>
            </select>
        </div>

        <div>
            <label id="txtSectorLabel" class="text-gray-600">Setor</label>
            <select id="sectorId" class="input">
                <option id="txtSectorAll" value="0">Todos</option>
            </select>
        </div>

        <!-- Público -->
        <div class="publico-container">
            <label class="publico-option">
                <input type="radio" name="publico" value="todos" checked>
                <span id="txtPublicAll">Todos</span>
            </label>

            <label class="publico-option">
                <input type="radio" name="publico" value="operador" />
                <span id="txtPublicOperator">Operador</span>
            </label>

            <label class="publico-option">
                <input type="radio" name="publico" value="lider" />
                <span id="txtPublicLeader">Líder</span>
            </label>

            <label class="publico-option">
                <input type="radio" name="publico" value="masv" />
                <span id="txtPublicMasv">MA/SV</span>
            </label>
        </div>

        <input id="txtSearch" type="text" placeholder="Buscar texto..." class="input w-48">

        <button id="btnBuscar" class="btn-primary">Buscar</button>
    </div>

    <!-- =========================================================
         TABELA
    ========================================================= -->
    <div class="p-4">
        <table class="min-w-full border rounded shadow bg-white">
            <thead>
                <tr>
                    <th id="txtColRead" class="border p-2 text-center">Lido</th>
                    <th class="border p-2">ID</th>
                    <th id="txtColDate" class="border p-2 col-data">Data</th>
                    <th id="txtColOperator" class="border p-2">Operador</th>
                    <th id="txtColCategory" class="border p-2">Categoria</th>
                    <th id="txtColEquipment" class="border p-2">Equipamento</th>
                    <th id="txtColLocal" class="border p-2">Local</th>
                    <th id="txtColSector" class="border p-2 col-setor">Setor</th>
                    <th id="txtColDescription" class="border p-2">Descrição</th>
                    <th id="txtColActions" class="border p-2 text-center">Ações</th>
                </tr>
            </thead>
            <tbody id="tblHikitsugui"></tbody>
        </table>
    </div>

    <!-- =========================================================
         MODAL LEITURA
    ========================================================= -->
    <div id="modal" class="modal hidden">
        <div class="modal-content">

            <h2 id="txtReadModalTitle" class="mb-4">Detalhes do Hikitsugui</h2>

            <div id="modal-body" class="mb-4"></div>

            <label id="txtReplyLabel" class="text-gray-600 font-semibold">Responder</label>

            <div class="mb-4">
                <div class="editor-toolbar">
                    <button type="button" data-cmd="bold"><b>B</b></button>
                    <button type="button" data-cmd="italic"><i>I</i></button>
                    <button type="button" data-cmd="underline"><u>U</u></button>
                    <span class="separator"></span>
                    <button type="button" id="btnReplyList" data-cmd="insertUnorderedList">• Lista</button>
                    <button type="button" id="btnClearReplyFormat">Limpar</button>
                </div>

                <div id="replyEditor"
                     class="editor"
                     contenteditable="true"
                     data-placeholder="Responder..."></div>
            </div>

            <div class="flex justify-end gap-4">
                <button id="btnEnviarReply" class="btn-primary">Enviar Resposta</button>
                <button id="btnFecharModal" class="btn-secondary">Fechar</button>
            </div>

        </div>
    </div>

    <script src="app.js"></script>

    <!-- =========================================================
         MODAL DE EDIÇÃO
    ========================================================= -->
    <div id="modalEdit" class="modal hidden">
        <div class="modal-content modal-edit">

            <h2 id="txtEditModalTitle" class="modal-title">Editar Hikitsugui</h2>

            <div class="form-grid">
                <div class="form-group">
                    <label id="txtEditCategoryLabel">Categoria</label>
                    <select id="editCategoria" class="input"></select>
                </div>

                <div class="form-group">
                    <label id="txtEditEquipmentLabel">Equipamento</label>
                    <select id="editEquipamento" class="input"></select>
                </div>

                <div class="form-group">
                    <label id="txtEditLocalLabel">Local</label>
                    <select id="editLocal" class="input"></select>
                </div>

                <div class="form-group">
                    <label id="txtEditSectorLabel">Setor</label>
                    <select id="editSector" class="input"></select>
                </div>
            </div>

            <div class="form-group mt-4">
                <label id="txtEditDescriptionLabel">Descrição</label>

                <div class="editor-toolbar edit-toolbar">
                    <button type="button" data-cmd="bold"><b>B</b></button>
                    <button type="button" data-cmd="italic"><i>I</i></button>
                    <button type="button" data-cmd="underline"><u>U</u></button>
                    <span class="separator"></span>
                    <button type="button" id="btnEditList" data-cmd="insertUnorderedList">• Lista</button>
                    <button type="button" id="btnClearEditFormat">Limpar</button>
                </div>

                <div id="editDescricao"
                     class="editor"
                     contenteditable="true"
                     data-placeholder="Descreva aqui..."></div>
            </div>

            <div class="mt-4">
                <label id="txtEditAttachmentsLabel" class="text-gray-600">Anexos</label>

                <input id="editFileUpload" type="file" multiple class="input" />

                <ul id="editExistingFiles" class="file-list"></ul>
                <ul id="editNewFiles" class="file-list"></ul>
            </div>

            <div class="modal-actions">
                <button id="btnSaveEdit" type="button" onclick="saveEdit()" class="btn-primary">Salvar</button>

                <button id="btnCancelEdit" type="button" onclick="closeEditModal()" class="btn-secondary">Cancelar</button>
            </div>

        </div>
    </div>
</body>
</html>
