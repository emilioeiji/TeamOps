<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Relatorio Follow</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header-bar">
        <div class="header-copy">
            <h1 data-i18n="headerTitle">Relatorio Follow</h1>
            <p data-i18n="headerSubtitle">Consulta dos acompanhamentos com busca rapida, exportacao e impressao.</p>
        </div>
        <div class="header-badge"><strong id="totalCount">0</strong><span id="totalSuffix"> registros</span></div>
    </header>

    <main class="page-shell">
        <section class="filter-card">
            <div class="filter-grid">
                <label class="filter-field">
                    <span data-i18n="labelStart">Data Inicial</span>
                    <input id="dtInicial" class="input" type="date">
                </label>

                <label class="filter-field">
                    <span data-i18n="labelEnd">Data Final</span>
                    <input id="dtFinal" class="input" type="date">
                </label>

                <label class="filter-field">
                    <span data-i18n="labelShift">Turno</span>
                    <select id="cmbShift" class="input"></select>
                </label>

                <label class="filter-field">
                    <span data-i18n="labelType">Tipo</span>
                    <select id="cmbType" class="input"></select>
                </label>

                <label class="filter-field">
                    <span data-i18n="labelReason">Motivo</span>
                    <select id="cmbReason" class="input"></select>
                </label>

                <label class="filter-field">
                    <span data-i18n="labelSector">Setor</span>
                    <select id="cmbSector" class="input"></select>
                </label>

                <label class="filter-field filter-field-wide">
                    <span data-i18n="labelSearch">Buscar</span>
                    <input id="txtSearch" class="input" type="text" data-i18n-placeholder="searchPlaceholder" placeholder="Operador, descricao, orientacao, setor...">
                </label>

                <div class="filter-actions">
                    <button id="btnBuscar" class="btn-secondary" type="button" data-i18n="btnSearch">Buscar</button>
                    <button id="btnLimpar" class="btn-ghost" type="button" data-i18n="btnClear">Limpar</button>
                    <button id="btnExportar" class="btn-primary" type="button" data-i18n="btnExport">Exportar</button>
                </div>
            </div>
        </section>

        <section class="table-card">
            <div class="table-head">
                <div>
                    <h2 data-i18n="tableTitle">Registros</h2>
                    <p data-i18n="tableSubtitle">Filtros reduzidos para manter a busca mais rapida no dia a dia.</p>
                </div>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th data-i18n="colDate">Data</th>
                            <th data-i18n="colShift">Turno</th>
                            <th data-i18n="colOperator">Operador</th>
                            <th data-i18n="colType">Tipo</th>
                            <th data-i18n="colReason">Motivo</th>
                            <th data-i18n="colSector">Setor</th>
                            <th data-i18n="colDescription">Descricao</th>
                            <th data-i18n="colGuidance">Orientacao</th>
                            <th class="actions-col" data-i18n="colActions">Acoes</th>
                        </tr>
                    </thead>
                    <tbody id="tblBody">
                        <tr>
                            <td colspan="9" class="empty-cell" data-i18n="loading">Carregando...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="modal" class="modal hidden">
        <div class="modal-content">
            <button id="btnCloseModal" class="close" type="button" aria-label="Fechar">x</button>
            <div class="modal-head">
                <h3 data-i18n="modalTitle">Detalhes do Acompanhamento</h3>
                <div class="modal-actions">
                    <button id="btnModalOperator" class="btn-secondary" type="button" data-i18n="btnOperatorHistory">Historico do operador</button>
                    <button id="btnModalPrint" class="btn-primary" type="button" data-i18n="btnPrintSheet">Ficha para impressao</button>
                </div>
            </div>
            <div id="modalBody" class="modal-body"></div>
        </div>
    </div>

    <div id="toast" class="toast hidden">
        <strong id="toastTitle">-</strong>
        <span id="toastMessage">-</span>
    </div>

    <script src="app.js"></script>
</body>
</html>
