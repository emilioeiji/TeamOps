<!DOCTYPE html>
<html lang="pt">
<head>

</head>

<body>

    <!-- HEADER -->

        <h1 id="sectorName">Setor</h1>

    </div>

    <!-- JS carregado via domínio virtual -->
    <script src="https://app/app.js"></script>

</html>
