<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Presence Layout</title>

    <link rel="stylesheet" href="https://local/style.css">
</head>

<body>

<header>
    <h1 id="sectorName"></h1>

    <div class="filters">
        <input type="date" id="datePicker">
        <select id="shiftPicker">
            <option value="1">Dia</option>
            <option value="2">Noite</option>
        </select>
    
        <button id="btnRefresh">Atualizar</button>
        <button id="btnImportSchedule">Importar</button>
    
        <div id="summaryBox">Total: 0</div>
    </div>
</header>

<main>
    <div id="mapContainer">
        <img id="mapImage" src="https://local/assets/g-bareru.png">
        <div id="operatorsLayer"></div>
    </div>
</main>

<script src="https://local/app.js"></script>

</body>
</html>
